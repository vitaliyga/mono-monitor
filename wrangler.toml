name = "mono-monitor-bot"
main = "src/index.js"
compatibility_date = "2026-06-01"

# Перевірка курсу кожні 10 хвилин.
# monobank кешує курс ~5 хв і лімітує частоту запитів,
# тому частіше ставити не варто.
[triggers]
crons = ["*/10 * * * *"]

# Сховище підписників та їхніх налаштувань.
# id підстав після `wrangler kv namespace create KV`.
[[kv_namespaces]]
binding = "KV"
id = "2beffbfb71534c0ab2bd13d0b639c3ec"

# BOT_TOKEN і WEBHOOK_SECRET задаються як секрети, не тут:
#   wrangler secret put BOT_TOKEN
#   wrangler secret put WEBHOOK_SECRET
